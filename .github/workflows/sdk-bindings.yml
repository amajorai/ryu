# Multi-language SDK bindings — pipeline proof.
#
# Builds the crates/sdk/uniffi cdylib, generates the Python binding from it,
# and runs a smoke test that exercises the shared Rust rules through the
# generated module. Proves the end-to-end UniFFI pipeline with ONE language
# (Python: built into UniFFI, zero third-party bindgen). Go (cgo) and C#
# (uniffi-bindgen-cs) are out of scope for PR-1 — see
# docs/multi-language-bindings-spec.md for the per-language rollout + supply-chain
# caveats.
name: SDK bindings

on:
  push:
    paths:
      - "crates/sdk/core/**"
      - "crates/sdk/uniffi/**"
      - "bindings/python/**"
      - ".github/workflows/sdk-bindings.yml"
  pull_request:
    paths:
      - "crates/sdk/core/**"
      - "crates/sdk/uniffi/**"
      - "bindings/python/**"
      - ".github/workflows/sdk-bindings.yml"
  workflow_dispatch:

jobs:
  python:
    name: Python binding (Linux)
    runs-on: ubuntu-latest
    defaults:
      run:
        # ryu-sdk-uniffi is a standalone crate (its own Cargo.lock, not in a
        # workspace), so all cargo commands run from inside it.
        working-directory: crates/sdk/uniffi
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4.4.0

      - name: Install Rust
        uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4 # stable

      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          workspaces: crates/sdk/uniffi

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"

      # Rust-side guarantee: the wrapper enforces the same egress/manifest/semver
      # rules the C-ABI binding does. No foreign toolchain needed for this gate.
      - name: cargo test (shared-rule parity)
        run: cargo test --release

      - name: Build cdylib
        run: cargo build --release

      - name: Generate Python binding
        run: |
          # Standalone crate: `target/` is under the crate dir (the cwd), so the
          # cdylib is cwd-relative `target/release/...`; the out-dir is repo-root.
          # NOTE: this crate lives at crates/sdk/uniffi (3 levels down) — `../../`
          # only reaches crates/, which silently wrote the binding to
          # crates/bindings/python and broke the smoke-test import.
          # `../../../bindings/python/ryu_sdk`.
          cargo run --release --bin uniffi-bindgen -- \
            generate --library target/release/libryu_sdk_uniffi.so \
            --language python \
            --out-dir ../../../bindings/python/ryu_sdk
          # The generated module dlopens the compiled library at import time, so
          # it must sit next to the module.
          cp target/release/libryu_sdk_uniffi.so ../../../bindings/python/ryu_sdk/

      - name: Smoke test the generated binding
        working-directory: bindings/python
        run: PYTHONPATH=. python smoke_test.py
