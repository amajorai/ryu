name: Publish @ryu/sdk-native (napi)

# Builds the napi addon for every platform and publishes @ryu/sdk-native to npm
# from the PUBLIC repo, where Actions are free/unlimited. The napi source
# (crates/ryu-sdk-napi) + ryu-sdk are open-core mirrored, so this never needs the
# private repo. Fires on the mirrored `rust-sdk-v*` tag or manual dispatch.
#
# Required secret: NPM_TOKEN (npm automation token, set on amajorai/ryu).

on:
  push:
    tags:
      - "rust-sdk-v*"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: publish-napi-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-napi:
    strategy:
      fail-fast: false
      matrix:
        include:
          - host: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - host: macos-latest
            target: x86_64-apple-darwin
          - host: macos-latest
            target: aarch64-apple-darwin
          - host: windows-latest
            target: x86_64-pc-windows-msvc
    runs-on: ${{ matrix.host }}
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: crates/ryu-sdk-napi
      - name: Install binding deps
        working-directory: crates/ryu-sdk-napi
        run: bun install
      - name: Build napi addon
        working-directory: crates/ryu-sdk-napi
        run: bun x napi build --platform --release --target ${{ matrix.target }}
      - name: Upload prebuilt addon
        uses: actions/upload-artifact@v4
        with:
          name: napi-${{ matrix.target }}
          path: crates/ryu-sdk-napi/*.node
          if-no-files-found: error

  publish-napi:
    name: Publish @ryu/sdk-native to npm
    needs: build-napi
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: "https://registry.npmjs.org"
      - name: Install binding deps
        working-directory: crates/ryu-sdk-napi
        run: bun install
      - name: Download prebuilt addons
        uses: actions/download-artifact@v4
        with:
          pattern: napi-*
          path: crates/ryu-sdk-napi
          merge-multiple: true
      - name: Publish to npm
        working-directory: crates/ryu-sdk-napi
        run: bun publish --access public
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
