name: release

# Builds the full headless binary set and attaches it to a GitHub Release.
# Triggers on a pushed v* tag, or manually via workflow_dispatch with a tag input.
#
# The set is core + gateway (Rust) and the TUI (Bun, shipped under the `ryu-cli`
# asset name) × {linux-x86_64, macos-aarch64, windows-x86_64}. The 11 feature-app
# backends build in their OWN satellite repos (amajorai/ryu-<app>), not here.
# Asset names match Core's updater + installer contract
# (apps/desktop/src-tauri/src/core/install.rs OPTIONAL_SIDECARS, release-local.sh):
# ryu-core / ryu-gateway / ryu-cli / ryu-<app>, each `<asset>-<os>-<arch>[.exe]`, with a
# sibling `<asset>.sha256` the installers verify against.
#
# Standalone builds: this runs on the public mirror (amajorai/ryu), which ships NO root
# Cargo.toml, so every manifest builds as its own workspace and its binary lands in
# `<manifest-dir>/target/release/`.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to build and attach binaries to (e.g. v0.0.5)"
        required: true

permissions:
  contents: write

jobs:
  # Standardized notes come FIRST so the release exists (with a real changelog)
  # before any binary is attached to it.
  notes:
    name: Release notes
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # The changelog diffs against the previous tag — needs full history.
          fetch-depth: 0
      - name: Generate + publish standardized notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.event.inputs.tag || github.ref_name }}
        run: |
          set -euo pipefail
          # NOTE: this repo's history is mirror commits ("mirror: sync from
          # monorepo @ <sha>"), so a changelog generated HERE is meaningless.
          # Real notes are generated from the PRIVATE monorepo's history and
          # pushed by tools/publish-release-notes.sh. So: never clobber notes
          # that already exist — only seed a placeholder when the release does
          # not exist yet, so the binaries have somewhere to attach.
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release $TAG already exists — leaving its notes alone."
            exit 0
          fi
          node scripts/release-notes.mjs --tag "$TAG" --channel release --repo "$GITHUB_REPOSITORY" > notes.md
          gh release create "$TAG" --title "$TAG" --target "$GITHUB_SHA" --notes-file notes.md

  # apps/tui is the RECOMMENDED terminal client (apps/cli is deprecated), but it
  # is Bun/TypeScript, not Rust, so it cannot ride the cargo matrix below.
  # `bun build --compile` produces a standalone executable per platform.
  #
  # It must be built NATIVELY on each OS: @opentui/core pulls a platform-specific
  # native package (@opentui/core-<plat>), so cross-compiling from one runner
  # fails to resolve the others. One job per OS, no cross-targets.
  #
  # The assets are named `ryu-cli-*` even though they ARE the TUI: install.sh,
  # install.ps1, and Core's updater fetch that exact name. Keeping the name means
  # the deprecated Rust CLI simply disappears without breaking a single installer
  # or updater contract.
  tui:
    needs: notes
    name: ryu-cli / tui (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.5
      - run: bun install --frozen-lockfile
      - name: Compile
        shell: bash
        run: |
          set -euo pipefail
          ext=""; [ "${{ runner.os }}" = "Windows" ] && ext=".exe"
          case "${{ runner.os }}" in
            Linux)   plat="linux-x86_64" ;;
            macOS)   plat="macos-aarch64" ;;
            Windows) plat="windows-x86_64" ;;
          esac
          mkdir -p dist
          ( cd apps/tui && bun build --compile src/index.tsx --outfile "../../dist/ryu-cli-${plat}${ext}" )
          ( cd dist
            if command -v sha256sum >/dev/null 2>&1; then sha256sum "ryu-cli-${plat}${ext}" > "ryu-cli-${plat}${ext}.sha256"
            elif command -v shasum >/dev/null 2>&1; then shasum -a 256 "ryu-cli-${plat}${ext}" > "ryu-cli-${plat}${ext}.sha256"; fi )
      # Artifacts, NOT a release upload: the org disables contents:write for
      # GITHUB_TOKEN, so uploading straight to the release 403s with
      # "Resource not accessible by integration". Artifacts need no write scope;
      # tools/attach-artifacts.sh downloads them and attaches them to the release
      # using a token that does have it.
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ github.job }}-${{ runner.os }}-${{ strategy.job-index }}
          path: dist/*
          if-no-files-found: ignore
          retention-days: 7

  # Desktop installers. The source is source-available in this repo (see
  # LICENSE-COMMERCIAL.md), so it builds HERE on free public runners instead of
  # the private repo.
  #
  # Signing is OPTIONAL and secret-gated: with TAURI_SIGNING_PRIVATE_KEY set on
  # this repo the artifacts are signed and the updater accepts them; without it
  # the installers still build and are downloadable, they just carry no update
  # signature. That keeps the release working before any decision is made about
  # putting the signing key on a public repo.
  desktop:
    needs: notes
    name: desktop (${{ matrix.platform }})
    runs-on: ${{ matrix.platform }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: "--target aarch64-apple-darwin"
          - platform: macos-latest
            args: "--target x86_64-apple-darwin"
          - platform: ubuntu-22.04
            args: ""
          - platform: windows-latest
            args: ""
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.5
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}
      - name: Install Linux build deps
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf
      - run: bun install
      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          NODE_OPTIONS: --max-old-space-size=8192
          # Vite INLINES these; apps/desktop/.env is gitignored, so without them a
          # released build bakes the localhost fallbacks and cannot sign in.
          VITE_APP_BACKEND_URL: ${{ vars.VITE_APP_BACKEND_URL || 'https://api.ryuhq.com' }}
          VITE_APP_FRONTEND_URL: ${{ vars.VITE_APP_FRONTEND_URL || 'https://ryuhq.com' }}
          VITE_APP_WEB_URL: ${{ vars.VITE_APP_WEB_URL || 'https://ryuhq.com' }}
          VITE_SENTRY_DSN: ${{ vars.VITE_SENTRY_DSN }}
          VITE_POSTHOG_KEY: ${{ vars.VITE_POSTHOG_KEY }}
          VITE_POSTHOG_HOST: ${{ vars.VITE_POSTHOG_HOST }}
          SENTRY_DSN: ${{ vars.SENTRY_DSN }}
        with:
          projectPath: apps/desktop
          # NO tagName/releaseName: passing them makes tauri-action publish to the
          # release itself, which 403s because the org disables contents:write for
          # GITHUB_TOKEN. Without them it just builds, and the installers are
          # collected as artifacts below.
          args: ${{ matrix.args }}
      - name: Collect desktop installers
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist-desktop
          find apps/desktop/src-tauri/target -type f \
            \( -name "*.dmg" -o -name "*.AppImage" -o -name "*.deb" -o -name "*.rpm" \
               -o -name "*.msi" -o -name "*-setup.exe" -o -name "*.sig" \) \
            -not -path "*deps*" -exec cp {} dist-desktop/ \; || true
          ls -la dist-desktop || true
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: desktop-${{ runner.os }}-${{ strategy.job-index }}
          path: dist-desktop/*
          if-no-files-found: ignore
          retention-days: 7

  # Island companion (Electron). Same rationale as desktop: source-available here,
  # so it builds on free public runners.
  island:
    needs: notes
    name: island (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.5
      # uiohook-napi compiles libuiohook from source on Linux and needs the X11
      # headers; without them node-gyp dies with "X11/keysym.h: No such file".
      - name: Linux build deps
        if: runner.os == Linux
        run: sudo apt-get update && sudo apt-get install -y libx11-dev libxtst-dev libxinerama-dev libxkbcommon-dev libxkbfile-dev
      - run: bun install
      # `build` only runs electron-vite; `dist` is the one that packages installers
      # via electron-builder. --publish never: the upload step below owns that, so
      # electron-builder never needs a token or races the release.
      - name: Package Island
        working-directory: apps/island
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: bun run dist -- --publish never
      - name: Collect installers
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist-island
          # electron-builder's output layout varies per platform; take the
          # installers and skip the unpacked build trees.
          find apps/island -type f \
            \( -name "*.dmg" -o -name "*.AppImage" -o -name "*.deb" -o -name "*.exe" -o -name "*.zip" \) \
            -not -path "*/node_modules/*" -not -path "*unpacked*" \
            -exec cp {} dist-island/ \; || true
          ls -la dist-island || true
      # Artifacts, NOT a release upload: the org disables contents:write for
      # GITHUB_TOKEN, so uploading straight to the release 403s with
      # "Resource not accessible by integration". Artifacts need no write scope;
      # tools/attach-artifacts.sh downloads them and attaches them to the release
      # using a token that does have it.
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ github.job }}-${{ runner.os }}-${{ strategy.job-index }}
          path: dist/*
          if-no-files-found: ignore
          retention-days: 7

  build:
    needs: notes
    name: ${{ matrix.target.asset }} (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    # audiopus_sys (transitive: opus codec) vendors a CMakeLists that requires
    # cmake_minimum_required(<3.5); CMake >= 4.0 (current runner images) removed that
    # compatibility. CMake honours this env var to configure the legacy project anyway.
    env:
      CMAKE_POLICY_VERSION_MINIMUM: "3.5"
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        target:
          # headless trio (standalone [package] manifests under apps/)
          - { asset: ryu-core,       bin: ryu-core,       dir: apps/core }
          - { asset: ryu-gateway,    bin: ryu-gateway,    dir: apps/gateway }
          # the 11 feature-app backend sidecars (apps-store/<app>/backend)
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      # Full build-dep union for every bin (opus for the audio crates was the actual
      # v0.0.4 macOS failure — pkg-config could not find Opus).
      - name: Linux build deps
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y pkg-config libssl-dev libdbus-1-dev libopus-dev

      - name: macOS build deps
        if: runner.os == 'macOS'
        run: brew install dbus pkg-config opus

      - name: Install protoc (prost-build)
        uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: ${{ matrix.target.dir }}

      - name: Build
        run: cargo build --release --manifest-path ${{ matrix.target.dir }}/Cargo.toml

      - name: Package
        shell: bash
        run: |
          set -e
          ext=""; [ "${{ runner.os }}" = "Windows" ] && ext=".exe"
          # Accurate os-arch labels matching Core's updater (update::platform_match_score
          # / install.rs platform_slug); macos-latest is Apple Silicon, so aarch64.
          case "${{ runner.os }}" in
            Linux)   plat="linux-x86_64" ;;
            macOS)   plat="macos-aarch64" ;;
            Windows) plat="windows-x86_64" ;;
          esac
          src="${{ matrix.target.dir }}/target/release/${{ matrix.target.bin }}${ext}"
          asset="${{ matrix.target.asset }}-${plat}${ext}"
          mkdir -p dist
          cp "$src" "dist/$asset"
          # Portable sha256 (Linux/Windows-git ship sha256sum; macOS ships shasum) in the
          # standard `<hash>  <name>` form the installers read (field 1). Basename only.
          ( cd dist
            if command -v sha256sum >/dev/null 2>&1; then sha256sum "$asset" > "$asset.sha256"
            elif command -v shasum   >/dev/null 2>&1; then shasum -a 256 "$asset" > "$asset.sha256"
            else echo "! no sha256 tool — skipping checksum for $asset" >&2; fi )

      # Artifacts, NOT a release upload: the org disables contents:write for
      # GITHUB_TOKEN, so uploading straight to the release 403s with
      # "Resource not accessible by integration". Artifacts need no write scope;
      # tools/attach-artifacts.sh downloads them and attaches them to the release
      # using a token that does have it.
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ github.job }}-${{ runner.os }}-${{ strategy.job-index }}
          path: dist/*
          if-no-files-found: ignore
          retention-days: 7
