name: nightly

# Free nightly build of the open-core headless trio (core / gateway / cli), published
# as a rolling `nightly` PRERELEASE on this public repo. GitHub Actions minutes are free
# for public repos, so this only ever runs here on amajorai/ryu — the workflow reaches this
# repo via the private monorepo's overlay (mirror/overlay/), never runs in ryu-closed.
#
# Why a prerelease is safe: Core's headless updater (apps/core/src/update/mod.rs) resolves
# `GET /repos/amajorai/ryu/releases/latest`, which GitHub defines to EXCLUDE prereleases and
# drafts. So even though the nightly assets reuse the real updater's names
# (ryu-core-<plat>, …), an installed Core node never auto-updates onto a nightly. Only the
# signed, tagged `v*` releases (release.yml) are ever "latest".
#
# The `nightly` git tag + release are rolled forward each run (delete + recreate) so the tag
# always points at the main it was built from and users can fetch /releases/tag/nightly.

on:
  schedule:
    - cron: "0 7 * * *" # 07:00 UTC daily
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: nightly
  cancel-in-progress: true

jobs:
  # Skip the whole run when main has not moved since yesterday, so a quiet repo does not
  # republish identical binaries. Manual dispatch always builds. The 25h window is wider
  # than the 24h cron so a delayed scheduled run never drops a day of real commits.
  gate:
    runs-on: ubuntu-latest
    outputs:
      build: ${{ steps.check.outputs.build }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - id: check
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "Manual dispatch — building."
            echo "build=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if [ -n "$(git log --since='25 hours ago' --oneline)" ]; then
            echo "New commits on main — building."
            echo "build=true" >> "$GITHUB_OUTPUT"
          else
            echo "No commits in the last 25h — skipping nightly."
            echo "build=false" >> "$GITHUB_OUTPUT"
          fi

  # Roll the `nightly` tag and prerelease forward to today's main BEFORE the matrix uploads,
  # so the parallel build jobs upload into an existing release instead of racing to create it.
  prepare:
    needs: gate
    if: needs.gate.outputs.build == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Reset the rolling nightly tag + prerelease
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          # Drop the old release AND its tag, then recreate the tag at today's HEAD via
          # `gh release create --target`. || true keeps the first-ever run (no nightly yet) green.
          gh release delete nightly --yes --cleanup-tag || true
          DATE=$(date -u +%Y-%m-%d)
          gh release create nightly \
            --prerelease \
            --target "$GITHUB_SHA" \
            --title "Nightly ($DATE)" \
            --notes "Automated nightly build of the Ryu open-core binaries (core / gateway / cli) from \`main\` at $DATE. These are unsigned prereleases for testing — installed Ryu nodes never auto-update onto them (the updater only tracks the latest tagged \`v*\` release). For anything real, use the tagged releases."

  build:
    needs: [gate, prepare]
    if: needs.gate.outputs.build == 'true'
    name: ${{ matrix.bin }} (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # headless trio — all three desktop OSes (mirrors release.yml)
          - { os: ubuntu-latest,  dir: core,    bin: ryu-core,    ext: "" }
          - { os: macos-latest,   dir: core,    bin: ryu-core,    ext: "" }
          - { os: windows-latest, dir: core,    bin: ryu-core,    ext: ".exe" }
          - { os: ubuntu-latest,  dir: gateway, bin: ryu-gateway, ext: "" }
          - { os: macos-latest,   dir: gateway, bin: ryu-gateway, ext: "" }
          - { os: windows-latest, dir: gateway, bin: ryu-gateway, ext: ".exe" }
          - { os: ubuntu-latest,  dir: cli,     bin: ryu,         ext: "" }
          - { os: macos-latest,   dir: cli,     bin: ryu,         ext: "" }
          - { os: windows-latest, dir: cli,     bin: ryu,         ext: ".exe" }
    steps:
      - uses: actions/checkout@v4

      - name: Linux build deps
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y pkg-config libssl-dev libdbus-1-dev

      - name: macOS build deps (Core)
        if: runner.os == 'macOS' && matrix.dir == 'core'
        run: brew install dbus pkg-config

      - name: Install protoc (Core needs prost-build)
        if: matrix.dir == 'core'
        uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/${{ matrix.dir }}

      - name: Build
        run: cargo build --release --manifest-path apps/${{ matrix.dir }}/Cargo.toml

      - name: Package
        shell: bash
        run: |
          set -e
          src="apps/${{ matrix.dir }}/target/release/${{ matrix.bin }}${{ matrix.ext }}"
          name="${{ matrix.bin }}"; [ "$name" = "ryu" ] && name="ryu-cli"
          # Same os-arch labels as release.yml so the asset names line up across trains;
          # macos-latest is Apple Silicon, so aarch64.
          case "${{ runner.os }}" in
            Linux)   plat="linux-x86_64" ;;
            macOS)   plat="macos-aarch64" ;;
            Windows) plat="windows-x86_64" ;;
          esac
          asset="${name}-${plat}${{ matrix.ext }}"
          mkdir -p dist
          cp "$src" "dist/$asset"

      - name: Upload to the nightly prerelease
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload nightly dist/* --clobber
