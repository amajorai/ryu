name: nightly

# Free nightly build of the open-core headless set (core / gateway / cli + the 11
# feature-app backend sidecars), published as a rolling `nightly` PRERELEASE on this
# public repo. GitHub Actions minutes are free for public repos, so this only ever runs
# here on amajorai/ryu — the workflow reaches this repo via the private monorepo's overlay
# (mirror/overlay/), never runs in ryu-closed.
#
# Why a prerelease is safe: Core's headless updater (apps/core/src/update/mod.rs) resolves
# `GET /repos/amajorai/ryu/releases/latest`, which GitHub defines to EXCLUDE prereleases and
# drafts. So even though the nightly assets reuse the real updater's names
# (ryu-core-<plat>, …), an installed Core node never auto-updates onto a nightly. Only the
# signed, tagged `v*` releases (release.yml) are ever "latest".
#
# The `nightly` git tag + release are rolled forward each run (delete + recreate) so the tag
# always points at the main it was built from and users can fetch /releases/tag/nightly.

on:
  schedule:
    - cron: "0 7 * * *" # 07:00 UTC daily
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: nightly
  cancel-in-progress: true

jobs:
  # Skip the whole run when main has not moved since yesterday, so a quiet repo does not
  # republish identical binaries. Manual dispatch always builds. The 25h window is wider
  # than the 24h cron so a delayed scheduled run never drops a day of real commits.
  gate:
    runs-on: ubuntu-latest
    outputs:
      build: ${{ steps.check.outputs.build }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - id: check
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "Manual dispatch — building."
            echo "build=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if [ -n "$(git log --since='25 hours ago' --oneline)" ]; then
            echo "New commits on main — building."
            echo "build=true" >> "$GITHUB_OUTPUT"
          else
            echo "No commits in the last 25h — skipping nightly."
            echo "build=false" >> "$GITHUB_OUTPUT"
          fi

  # Roll the `nightly` tag and prerelease forward to today's main BEFORE the matrix uploads,
  # so the parallel build jobs upload into an existing release instead of racing to create it.
  prepare:
    needs: gate
    if: needs.gate.outputs.build == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Reset the rolling nightly tag + prerelease
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          # Drop the old release AND its tag, then recreate the tag at today's HEAD via
          # `gh release create --target`. || true keeps the first-ever run (no nightly yet) green.
          gh release delete nightly --yes --cleanup-tag || true
          DATE=$(date -u +%Y-%m-%d)
          # Notes must be GENERATED before the release references them — the
          # rolling-build banner, no changelog (mirror history is just sync
          # commits, and no publish step follows to fill one in).
          node scripts/release-notes.mjs --channel nightly --repo "$GITHUB_REPOSITORY" --no-changelog > notes.md
          gh release create nightly \
            --prerelease \
            --target "$GITHUB_SHA" \
            --title "Nightly ($DATE)" \
            --notes-file notes.md

  # Desktop installers. The source is source-available in this repo (see
  # LICENSE-COMMERCIAL.md), so it builds HERE on free public runners instead of
  # the private repo.
  #
  # Signing is OPTIONAL and secret-gated: with TAURI_SIGNING_PRIVATE_KEY set on
  # this repo the artifacts are signed and the updater accepts them; without it
  # the installers still build and are downloadable, they just carry no update
  # signature. That keeps the release working before any decision is made about
  # putting the signing key on a public repo.
  desktop:
    needs: [gate, prepare]
    name: desktop (${{ matrix.platform }})
    runs-on: ${{ matrix.platform }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: "--target aarch64-apple-darwin"
          - platform: macos-latest
            args: "--target x86_64-apple-darwin"
          - platform: ubuntu-22.04
            args: ""
          - platform: windows-latest
            args: ""
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.5
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}
      - name: Install Linux build deps
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf
      - run: bun install
      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          NODE_OPTIONS: --max-old-space-size=8192
          # Vite INLINES these; apps/desktop/.env is gitignored, so without them a
          # released build bakes the localhost fallbacks and cannot sign in.
          VITE_APP_BACKEND_URL: ${{ vars.VITE_APP_BACKEND_URL || 'https://api.ryuhq.com' }}
          VITE_APP_FRONTEND_URL: ${{ vars.VITE_APP_FRONTEND_URL || 'https://ryuhq.com' }}
          VITE_APP_WEB_URL: ${{ vars.VITE_APP_WEB_URL || 'https://ryuhq.com' }}
          VITE_SENTRY_DSN: ${{ vars.VITE_SENTRY_DSN }}
          VITE_POSTHOG_KEY: ${{ vars.VITE_POSTHOG_KEY }}
          VITE_POSTHOG_HOST: ${{ vars.VITE_POSTHOG_HOST }}
          SENTRY_DSN: ${{ vars.SENTRY_DSN }}
        with:
          projectPath: apps/desktop
          # NO tagName/releaseName: those make tauri-action publish to the release
          # itself (an update-a-release PATCH), which the App token is refused
          # ("Resource not accessible by integration"). Build only; the installers
          # are collected and uploaded via the assets endpoint below.
          args: ${{ matrix.args }}
      - name: Collect desktop installers
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist-desktop
          find apps/desktop/src-tauri/target -type f \
            \( -name "*.dmg" -o -name "*.AppImage" -o -name "*.deb" -o -name "*.rpm" \
               -o -name "*.msi" -o -name "*-setup.exe" -o -name "*.sig" \) \
            -not -path "*deps*" -exec cp {} dist-desktop/ \; || true
          ls -la dist-desktop || true
      - name: Upload to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob
          files=(dist-desktop/*)
          if [ ${#files[@]} -eq 0 ]; then echo "no desktop installers on this platform — skipping" >&2; exit 0; fi
          gh release upload nightly "${files[@]}" --clobber

  # Island companion (Electron). Same rationale as desktop: source-available here,
  # so it builds on free public runners.
  island:
    needs: [gate, prepare]
    name: island (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-2022]
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.5
      # uiohook-napi compiles libuiohook from source on Linux and needs the X11
      # headers; without them node-gyp dies with "X11/keysym.h: No such file".
      - name: Linux build deps
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libx11-dev libx11-xcb-dev libxt-dev libxtst-dev libxinerama-dev libxkbcommon-dev libxkbfile-dev libxrandr-dev libxi-dev libxcursor-dev libxss-dev
      - run: bun install
      # `build` only runs electron-vite; `dist` is the one that packages installers
      # via electron-builder. --publish never: the upload step below owns that, so
      # electron-builder never needs a token or races the release.
      - name: Package Island
        working-directory: apps/island
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # node-gyp cannot locate Visual Studio on windows-latest without this.
          GYP_MSVS_VERSION: "2022"
          npm_config_msvs_version: "2022"
        run: bun run dist -- --publish never
      - name: Collect installers
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist-island
          # electron-builder's output layout varies per platform; take the
          # installers and skip the unpacked build trees.
          find apps/island -type f \
            \( -name "*.dmg" -o -name "*.AppImage" -o -name "*.deb" -o -name "*.exe" -o -name "*.zip" \) \
            -not -path "*/node_modules/*" -not -path "*unpacked*" \
            -exec cp {} dist-island/ \; || true
          ls -la dist-island || true
      # gh release upload (assets endpoint), NOT softprops: softprops PATCHes the
      # release (update-a-release), which the App token is refused. Rolling builds
      # stay lenient — a platform that produced no installer skips, not fails.
      - name: Upload to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob
          files=(dist-island/*)
          if [ ${#files[@]} -eq 0 ]; then echo "no island installers on this platform — skipping" >&2; exit 0; fi
          gh release upload nightly "${files[@]}" --clobber

  build:
    needs: [gate, prepare]
    if: needs.gate.outputs.build == 'true'
    name: ${{ matrix.target.asset }} (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    # audiopus_sys (transitive: opus codec) vendors a CMakeLists that requires
    # cmake_minimum_required(<3.5); CMake >= 4.0 (current runner images) removed that
    # compatibility. CMake honours this env var to configure the legacy project anyway.
    env:
      CMAKE_POLICY_VERSION_MINIMUM: "3.5"
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        target:
          # core + gateway only. The TUI (shipped as ryu-cli) is Bun, not cargo;
          # app backends build in their own satellite repos.
          - { asset: ryu-core,       bin: ryu-core,       dir: apps/core }
          - { asset: ryu-gateway,    bin: ryu-gateway,    dir: apps/gateway }
    steps:
      - uses: actions/checkout@v4

      - name: Linux build deps
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y pkg-config libssl-dev libdbus-1-dev libopus-dev

      - name: macOS build deps
        if: runner.os == 'macOS'
        run: brew install dbus pkg-config opus

      - name: Install protoc (prost-build)
        uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: ${{ matrix.target.dir }}

      - name: Build
        run: cargo build --release --manifest-path ${{ matrix.target.dir }}/Cargo.toml

      - name: Package
        shell: bash
        run: |
          set -e
          ext=""; [ "${{ runner.os }}" = "Windows" ] && ext=".exe"
          # Same os-arch labels as release.yml so the asset names line up across trains;
          # macos-latest is Apple Silicon, so aarch64.
          case "${{ runner.os }}" in
            Linux)   plat="linux-x86_64" ;;
            macOS)   plat="macos-aarch64" ;;
            Windows) plat="windows-x86_64" ;;
          esac
          src="${{ matrix.target.dir }}/target/release/${{ matrix.target.bin }}${ext}"
          asset="${{ matrix.target.asset }}-${plat}${ext}"
          mkdir -p dist
          cp "$src" "dist/$asset"
          ( cd dist
            if command -v sha256sum >/dev/null 2>&1; then sha256sum "$asset" > "$asset.sha256"
            elif command -v shasum   >/dev/null 2>&1; then shasum -a 256 "$asset" > "$asset.sha256"
            else echo "! no sha256 tool — skipping checksum for $asset" >&2; fi )

      - name: Upload to the nightly prerelease
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload nightly dist/* --clobber
