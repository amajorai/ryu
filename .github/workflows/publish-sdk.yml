name: publish-sdk

# Publishes the TypeScript SDK packages to npm (packages/client + sdk + create-ryu-app).
# Requires an NPM_TOKEN repository secret; the job cleanly no-ops if it's absent.
#
# SINGLE-OWNER RULE: the authoritative npm publisher is the PRIVATE
# .github/workflows/publish-sdk.yml, which fires on the version-bump commit to main
# and owns @ryuhq/sdk + create-ryu-app. To avoid a double-publish version conflict,
# this overlay does NOT auto-fire on the v* tag; it is manual-dispatch-only, kept for
# publishing packages/client (which the private path does not cover) on demand.
# crates.io publishing is intentionally deferred until `cargo deny check licenses` passes
# (see docs/open-core.md) and a CARGO_REGISTRY_TOKEN secret is added.

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  npm:
    runs-on: ubuntu-latest
    env:
      HAS_NPM: ${{ secrets.NPM_TOKEN != '' }}
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4.4.0

      - name: Skip notice
        if: env.HAS_NPM != 'true'
        run: echo "NPM_TOKEN secret not set — skipping npm publish."

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        if: env.HAS_NPM == 'true'
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        if: env.HAS_NPM == 'true'
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org
      - if: env.HAS_NPM == 'true'
        # NOT --frozen-lockfile: the public repo is a workspace SUBSET of the
        # monorepo, so the mirrored bun.lock never matches the subset and a frozen
        # install fails ("lockfile had changes"). Let bun resolve the public tree.
        run: bun install
      - name: Publish packages
        if: env.HAS_NPM == 'true'
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          set -e
          for pkg in packages/client packages/sdk packages/create-ryu-app; do
            echo "::group::publish $pkg"
            (cd "$pkg" && npm publish --access public --provenance) || echo "publish $pkg failed (already published or build step needed)"
            echo "::endgroup::"
          done
