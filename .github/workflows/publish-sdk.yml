name: publish-sdk

# Publishes the TypeScript SDK packages to npm on a v* tag.
# Requires an NPM_TOKEN repository secret; the job cleanly no-ops if it's absent.
# crates.io publishing is intentionally deferred until `cargo deny check licenses` passes
# (see docs/open-core.md) and a CARGO_REGISTRY_TOKEN secret is added.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  npm:
    runs-on: ubuntu-latest
    env:
      HAS_NPM: ${{ secrets.NPM_TOKEN != '' }}
    steps:
      - uses: actions/checkout@v4

      - name: Skip notice
        if: env.HAS_NPM != 'true'
        run: echo "NPM_TOKEN secret not set — skipping npm publish."

      - uses: oven-sh/setup-bun@v2
        if: env.HAS_NPM == 'true'
      - uses: actions/setup-node@v4
        if: env.HAS_NPM == 'true'
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org
      - if: env.HAS_NPM == 'true'
        # NOT --frozen-lockfile: the public repo is a workspace SUBSET of the
        # monorepo, so the mirrored bun.lock never matches the subset and a frozen
        # install fails ("lockfile had changes"). Let bun resolve the public tree.
        run: bun install
      - name: Publish packages
        if: env.HAS_NPM == 'true'
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          set -e
          for pkg in packages/client packages/sdk packages/create-ryu-app; do
            echo "::group::publish $pkg"
            (cd "$pkg" && npm publish --access public --provenance) || echo "publish $pkg failed (already published or build step needed)"
            echo "::endgroup::"
          done
