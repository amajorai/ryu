name: build-unsloth-sidecar

# Packages apps/unsloth-sidecar into a source tarball and publishes it as a STABLE
# release asset on THIS public repo (amajorai/ryu). The Ryu Fine-tuning app
# (com.ryu.finetune) points its manifest sidecar `source.url` at that asset, so Core
# downloads + extracts the Unsloth training runtime on first use, then
# `pip install -e ".[train]"`.
#
# This repo is the public mirror of the monorepo — apps/unsloth-sidecar lands here via
# tools/mirror-public.sh. Building on the public repo is deliberate: the download URL
# in plugin.json must resolve for every installed node, and it points at this repo's
# releases. Triggers on any change to the sidecar source (auto-refresh), on a change to
# this workflow (so the very first run bootstraps the release), or manually.

on:
  push:
    branches: [main]
    paths:
      - "apps/unsloth-sidecar/**"
      - ".github/workflows/build-unsloth-sidecar.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: build-unsloth-sidecar
  cancel-in-progress: true

jobs:
  package:
    runs-on: ubuntu-latest
    env:
      TAG: unsloth-sidecar-v1
      ASSET: ryu-unsloth-sidecar.tar.gz
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Package the sidecar source
        run: |
          set -euo pipefail
          if [ ! -f apps/unsloth-sidecar/pyproject.toml ]; then
            echo "::error::apps/unsloth-sidecar/pyproject.toml missing — nothing to package."
            exit 1
          fi
          # Whole-tree tarball with pyproject.toml + ryu_unsloth/ at the ARCHIVE ROOT.
          # Core extracts it whole-tree into the sidecar runtime dir, keys idempotency
          # off the root pyproject.toml, then runs `pip install -e ".[train]"`.
          tar czf "$ASSET" -C apps/unsloth-sidecar .
          sha256sum "$ASSET" | tee "$ASSET.sha256"
          echo "SHA256=$(cut -d' ' -f1 < "$ASSET.sha256")" >> "$GITHUB_ENV"

      - name: Publish / refresh the release asset
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          # Stable tag: create once, then clobber the asset on every source change so the
          # plugin.json URL is permanent.
          if ! gh release view "$TAG" >/dev/null 2>&1; then
            gh release create "$TAG" \
              --title "Unsloth training sidecar" \
              --notes "Source tarball for the Ryu Fine-tuning app's Unsloth LoRA/QLoRA training sidecar. Auto-published from apps/unsloth-sidecar; consumed by com.ryu.finetune's manifest sidecar \`source.url\`."
          fi
          gh release upload "$TAG" "$ASSET" "$ASSET.sha256" --clobber

      - name: Summary
        run: |
          {
            echo "### Unsloth sidecar published"
            echo ""
            echo "| field | value |"
            echo "| --- | --- |"
            echo "| asset | \`$ASSET\` |"
            echo "| sha256 | \`$SHA256\` |"
            echo "| url | https://github.com/${{ github.repository }}/releases/download/$TAG/$ASSET |"
          } >> "$GITHUB_STEP_SUMMARY"
