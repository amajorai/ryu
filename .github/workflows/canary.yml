name: canary

# Bleeding-edge build of the open-core headless set (core / gateway / cli + the 11
# feature-app backend sidecars) on EVERY push to main that touches the built sources,
# published as a rolling `canary` PRERELEASE. This is the fresh-on-merge companion to
# nightly.yml (the once-a-day snapshot); use canary to test the very latest main.
#
# Free-minutes note: like nightly.yml this reaches amajorai/ryu via the monorepo overlay
# (mirror/overlay/) and only ever runs on the public repo, never in ryu-closed.
#
# Prerelease safety (same as nightly): Core's updater resolves `releases/latest`, which
# GitHub excludes prereleases from, so installed nodes never auto-update onto a canary even
# though the assets reuse the real updater's names. Only signed `v*` releases are ever "latest".
#
# Concurrency: `cancel-in-progress: false` — a burst of merges QUEUES builds instead of killing
# an in-flight one. Cancelling mid-run would leave the `canary` release with a mix of new and
# --clobber'd old assets; queuing guarantees each run leaves a complete, consistent asset set.

on:
  push:
    branches: [main]
    paths:
      - "apps/core/**"
      - "apps/gateway/**"
      - "apps/cli/**"
      - "crates/**"
      - "Cargo.toml"
      - "Cargo.lock"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: canary
  cancel-in-progress: false

jobs:
  # Roll the `canary` tag + prerelease forward to this push's HEAD before the matrix uploads,
  # so parallel build jobs upload into an existing release instead of racing to create it.
  prepare:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Release notes diff against the previous tag — needs full history.
          fetch-depth: 0
      - name: Reset the rolling canary tag + prerelease
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          gh release delete canary --yes --cleanup-tag || true
          STAMP=$(date -u +'%Y-%m-%d %H:%M UTC')
          gh release create canary \
            --prerelease \
            --target "$GITHUB_SHA" \
            --title "Canary (${GITHUB_SHA:0:7})" \
            --notes-file notes.md

  # Desktop installers. The source is source-available in this repo (see
  # LICENSE-COMMERCIAL.md), so it builds HERE on free public runners instead of
  # the private repo.
  #
  # Signing is OPTIONAL and secret-gated: with TAURI_SIGNING_PRIVATE_KEY set on
  # this repo the artifacts are signed and the updater accepts them; without it
  # the installers still build and are downloadable, they just carry no update
  # signature. That keeps the release working before any decision is made about
  # putting the signing key on a public repo.
  desktop:
    needs: prepare
    name: desktop (${{ matrix.platform }})
    runs-on: ${{ matrix.platform }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: "--target aarch64-apple-darwin"
          - platform: macos-latest
            args: "--target x86_64-apple-darwin"
          - platform: ubuntu-22.04
            args: ""
          - platform: windows-latest
            args: ""
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.5
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}
      - name: Install Linux build deps
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf
      - run: bun install
      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          NODE_OPTIONS: --max-old-space-size=8192
          # Vite INLINES these; apps/desktop/.env is gitignored, so without them a
          # released build bakes the localhost fallbacks and cannot sign in.
          VITE_APP_BACKEND_URL: ${{ vars.VITE_APP_BACKEND_URL || 'https://api.ryuhq.com' }}
          VITE_APP_FRONTEND_URL: ${{ vars.VITE_APP_FRONTEND_URL || 'https://ryuhq.com' }}
          VITE_APP_WEB_URL: ${{ vars.VITE_APP_WEB_URL || 'https://ryuhq.com' }}
          VITE_SENTRY_DSN: ${{ vars.VITE_SENTRY_DSN }}
          VITE_POSTHOG_KEY: ${{ vars.VITE_POSTHOG_KEY }}
          VITE_POSTHOG_HOST: ${{ vars.VITE_POSTHOG_HOST }}
          SENTRY_DSN: ${{ vars.SENTRY_DSN }}
        with:
          projectPath: apps/desktop
          tagName: canary
          releaseName: canary
          # The notes job already wrote the real changelog — do not overwrite it.
          releaseBody: ""
          releaseDraft: false
          prerelease: true
          args: ${{ matrix.args }}

  # Island companion (Electron). Same rationale as desktop: source-available here,
  # so it builds on free public runners.
  island:
    needs: prepare
    name: island (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.5
      # uiohook-napi compiles libuiohook from source on Linux and needs the X11
      # headers; without them node-gyp dies with "X11/keysym.h: No such file".
      - name: Linux build deps
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libx11-dev libxtst-dev libxinerama-dev libxkbcommon-dev libxkbfile-dev libxrandr-dev libxi-dev libxcursor-dev libxss-dev
      - run: bun install
      # `build` only runs electron-vite; `dist` is the one that packages installers
      # via electron-builder. --publish never: the upload step below owns that, so
      # electron-builder never needs a token or races the release.
      - name: Package Island
        working-directory: apps/island
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # node-gyp cannot locate Visual Studio on windows-latest without this.
          GYP_MSVS_VERSION: "2022"
          npm_config_msvs_version: "2022"
        run: bun run dist -- --publish never
      - name: Collect installers
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist-island
          # electron-builder's output layout varies per platform; take the
          # installers and skip the unpacked build trees.
          find apps/island -type f \
            \( -name "*.dmg" -o -name "*.AppImage" -o -name "*.deb" -o -name "*.exe" -o -name "*.zip" \) \
            -not -path "*/node_modules/*" -not -path "*unpacked*" \
            -exec cp {} dist-island/ \; || true
          ls -la dist-island || true
      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: canary
          files: dist-island/*
          # Island packaging is still being brought onto this repo; a platform that
          # produces no installer must not fail the whole release.
          fail_on_unmatched_files: false
          make_latest: false

  build:
    needs: prepare
    name: ${{ matrix.target.asset }} (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    # audiopus_sys (transitive: opus codec) vendors a CMakeLists that requires
    # cmake_minimum_required(<3.5); CMake >= 4.0 (current runner images) removed that
    # compatibility. CMake honours this env var to configure the legacy project anyway.
    env:
      CMAKE_POLICY_VERSION_MINIMUM: "3.5"
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        target:
          # core + gateway only. The TUI (shipped as ryu-cli) is Bun, not cargo;
          # app backends build in their own satellite repos.
          - { asset: ryu-core,       bin: ryu-core,       dir: apps/core }
          - { asset: ryu-gateway,    bin: ryu-gateway,    dir: apps/gateway }
    steps:
      - uses: actions/checkout@v4

      - name: Linux build deps
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y pkg-config libssl-dev libdbus-1-dev libopus-dev

      - name: macOS build deps
        if: runner.os == 'macOS'
        run: brew install dbus pkg-config opus

      - name: Install protoc (prost-build)
        uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: ${{ matrix.target.dir }}

      - name: Build
        run: cargo build --release --manifest-path ${{ matrix.target.dir }}/Cargo.toml

      - name: Package
        shell: bash
        run: |
          set -e
          ext=""; [ "${{ runner.os }}" = "Windows" ] && ext=".exe"
          case "${{ runner.os }}" in
            Linux)   plat="linux-x86_64" ;;
            macOS)   plat="macos-aarch64" ;;
            Windows) plat="windows-x86_64" ;;
          esac
          src="${{ matrix.target.dir }}/target/release/${{ matrix.target.bin }}${ext}"
          asset="${{ matrix.target.asset }}-${plat}${ext}"
          mkdir -p dist
          cp "$src" "dist/$asset"
          ( cd dist
            if command -v sha256sum >/dev/null 2>&1; then sha256sum "$asset" > "$asset.sha256"
            elif command -v shasum   >/dev/null 2>&1; then shasum -a 256 "$asset" > "$asset.sha256"
            else echo "! no sha256 tool — skipping checksum for $asset" >&2; fi )

      - name: Upload to the canary prerelease
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload canary dist/* --clobber
