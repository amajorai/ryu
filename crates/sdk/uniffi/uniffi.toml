# UniFFI binding configuration.
#
# `cdylib_name` is the base name of the compiled shared library the generated
# bindings will dlopen at runtime (`libryu_sdk_uniffi.{so,dylib}` /
# `ryu_sdk_uniffi.dll`). Per-language sections below tune the emitted package
# shape. Python (first-party) + C# (third-party uniffi-bindgen-cs) are wired and
# generated; the Swift/Kotlin/Go sections are documented placeholders consumed
# when those languages land (see the per-language feasibility matrix in
# docs/multi-language-bindings-spec.md). One-command generation lives in the
# sibling `justfile` (`gen-python` / `gen-csharp` / `gen-go-uniffi`).

[bindings.python]
# The generated module is imported as `ryu_sdk` by the smoke test
# (`python -c "import ryu_sdk; ryu_sdk.validate_plugin_id('io.ryu.ok')"`).
cdylib_name = "ryu_sdk_uniffi"

[bindings.swift]
# Future slice. module_name kept stable so a published Swift package name does
# not churn when it lands.
module_name = "RyuSdk"

[bindings.kotlin]
# Future slice.
package_name = "com.ryu.sdk"

# C# is generated by the third-party `uniffi-bindgen-cs` (NordSecurity), which
# reads its own `[bindings.csharp]` block. The default namespace `uniffi.ryu_sdk`
# is used as-is (the committed C# smoke imports it); do not set a custom namespace
# here without updating bindings/csharp/Program.cs to match. Generator tag pinned
# to uniffi 0.28.3: v0.9.2+v0.28.3.
[bindings.csharp]

# Go's shipped binding is cgo over the C-ABI (crates/ryu-sdk-ffi, bindings/go),
# NOT uniffi — see docs/multi-language-bindings-spec.md §4. This placeholder marks
# the optional `uniffi-bindgen-go` parity path (justfile `gen-go-uniffi`); the cgo
# path stays primary.
[bindings.go]
