[package]
name = "ryu-sdk-uniffi"
version = "0.0.6"
edition = "2021"
description = "UniFFI binding surface over the ryu-sdk Rust core — the multi-language (Python/Swift/Kotlin, and optionally C#/Go) path. Exposes only the BLOCKING surface; streaming is a deferred callback-interface slice (see docs/multi-language-bindings-spec.md)."
license = "Apache-2.0"
repository = "https://github.com/amajorai/ryu"

[lib]
name = "ryu_sdk_uniffi"
# cdylib: the shared library `uniffi-bindgen generate --library` consumes to emit
# Python/Swift/Kotlin bindings. staticlib: for hosts that link statically. lib:
# so the wrapper surface stays unit-testable from Rust (no foreign toolchain
# needed in CI to assert the egress/manifest/semver rules).
crate-type = ["cdylib", "staticlib", "lib"]

[dependencies]
# The single shared kernel. Every binding (napi, ffi, this) wraps THIS crate and
# duplicates no logic, so the manifest rules + gateway egress blocklist + model
# transport can never drift across languages.
ryu-sdk = { path = "../core", version = "0.0.6" }
# Consume the async `ModelClient::stream` (impl Stream) inside the blocking
# `stream(messages, sink)` export, pumping each delta into the foreign ChatSink.
futures-util = "0.3"
serde_json = "1"
# The `RyuError` enum derives `thiserror::Error` for the foreign-surfaced
# message, matching how `ryu_sdk::ModelError` is built. Must be declared (the
# `lib.rs` `#[derive(thiserror::Error)]` would not resolve otherwise).
thiserror = "2"
# block_on the async ryu-sdk model/embedding clients on a shared multi-thread
# runtime, exactly as crates/ryu-sdk-ffi does (ffi/src/lib.rs:33-41).
tokio = { version = "1", features = ["rt-multi-thread"] }
# Pinned minor: uniffi-bindgen-cs / uniffi-bindgen-go (the third-party C#/Go
# generators) track UniFFI minors, so bumping this is a cross-language event.
# See the supply-chain section of docs/multi-language-bindings-spec.md.
uniffi = { version = "0.28", features = ["cli"] }

[dev-dependencies]
tokio = { version = "1", features = ["full"] }
