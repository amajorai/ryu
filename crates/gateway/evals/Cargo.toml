[package]
name = "ryu-gw-evals"
version = "0.0.9"
edition = "2021"
license = "AGPL-3.0-only"
repository = "https://github.com/amajorai/ryu"
description = "Ryu Gateway evals stage: per-request sampling + provider-score EMA (the live EvalsRunner) as a swappable EvalsBackend trait + registry with an in-memory built-in, plus the pure dataset scorers (score_case, aggregate_scores, assertions, judge helpers). A self-contained extracted gateway stage crate."

[dependencies]
serde = { version = "1", features = ["derive"] }
serde_json = "1"
dashmap = "6"
regex = "1"
tracing = "0.1"
