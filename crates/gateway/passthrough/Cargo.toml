[package]
name = "ryu-gw-passthrough"
version = "0.0.6"
edition = "2021"
license = "AGPL-3.0-only"
repository = "https://github.com/amajorai/ryu"
description = "Ryu Gateway passthrough wire-format redaction engine: the native-format (Anthropic Messages / OpenAI Responses) request-body + streaming-SSE DLP redaction over a narrow `PassthroughFirewall` interface, plus the upstream URL / path helpers and the `WireFormat` marker. The reverse-proxy `forward` orchestration, audit emission, and the `PassthroughBackend` trait + `PassthroughRegistry` stay in apps/gateway (they hold `SharedState` and drive the pipeline)."

[dependencies]
serde_json = "1"
