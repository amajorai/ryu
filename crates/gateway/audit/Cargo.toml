[package]
name = "ryu-gw-audit"
version = "0.0.7"
edition = "2021"
license = "AGPL-3.0-only"
repository = "https://github.com/amajorai/ryu"
description = "Ryu Gateway audit stage: the SQLite-backed append-only request log + lifetime token totals + query/summary, exposed as a swappable AuditBackend trait + id-keyed AuditRegistry with the built-in AuditLogger active by default. An extracted gateway stage crate (mirrors ryu-gw-budget / ryu-gw-evals)."

[dependencies]
serde = { version = "1", features = ["derive"] }
dashmap = "6"
rusqlite = { version = "0.40.0", features = ["bundled"] }
tracing = "0.1"
anyhow = "1"
dirs = "5"
