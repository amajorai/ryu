[package]
name = "ryu-gw-cache"
version = "0.0.8"
edition = "2021"
license = "AGPL-3.0-only"
repository = "https://github.com/amajorai/ryu"
description = "Ryu Gateway response-cache stage: the exact-match TTL cache (CacheBackend) and the embedding-similarity semantic cache (SemanticCacheBackend), each a swappable trait + id-keyed registry with an in-memory built-in. A self-contained extracted gateway stage crate."

[dependencies]
serde = { version = "1", features = ["derive"] }
serde_json = "1"
dashmap = "6"
sha2 = "0.10"
hex = "0.4"
reqwest = { version = "0.12", features = ["json"] }
anyhow = "1"
tracing = "0.1"
