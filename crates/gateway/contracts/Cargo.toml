[package]
name = "ryu-gw-contracts"
version = "0.0.7"
edition = "2021"
license = "AGPL-3.0-only"
repository = "https://github.com/amajorai/ryu"
description = "Shared value-types exchanged between Ryu Gateway stages (e.g. AlertTier). The neutral home for cross-stage vocabulary so peer stage crates (budget, firewall, …) never depend on each other."

[dependencies]
serde = { version = "1", features = ["derive"] }
