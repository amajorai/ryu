[package]
name = "ryu-gw-budget"
version = "0.0.6"
edition = "2021"
license = "AGPL-3.0-only"
repository = "https://github.com/amajorai/ryu"
description = "Ryu Gateway token-budget stage: per-user / per-agent / per-session token budgets + the per-window exec budget, as a swappable BudgetBackend trait + registry with an in-memory built-in. The first extracted gateway stage crate."

[dependencies]
serde = { version = "1", features = ["derive"] }
dashmap = "6"
ryu-gw-contracts = { path = "../contracts", version = "0.0.6" }
