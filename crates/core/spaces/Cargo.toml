[package]
name = "ryu-spaces"
version = "0.0.7"
edition = "2021"
license = "Apache-2.0"
description = "Spaces primitive for Ryu: named document collections with a sqlite-vec (`vec0`) vector store, a content-addressed blob store, per-space embedder, and a GraphRAG (entity/relation) retrieval strategy. An extracted Core capability crate consumed in-process as a NON-optional path dependency; embedders/rerankers are injected as `ryu_rag` instances so the crate has ZERO dependency on apps/core — the model-registry-driven embedder choice, default `~/.ryu` paths, tenancy (`Tenancy`/`ResourceTenancy`) mapping, and preferences all stay Core-side (`apps/core/src/server/spaces.rs` shim)."
repository = "https://github.com/amajorai/ryu"

# Versions are matched to apps/core/Cargo.toml so there is no version skew when
# Core links this crate in-process. This crate has ZERO dependency on apps/core.
[dependencies]
anyhow = "1"
chrono = { version = "0.4", features = ["serde"] }
regex = "1"
rusqlite = { version = "0.40.0", features = ["bundled"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
sha2 = "0.10"
sqlite-vec = "=0.1.6"
tokio = { version = "1", features = ["sync"] }
tracing = "0.1"
urlencoding = "2"
uuid = { version = "1", features = ["v4", "serde"] }
ryu-rag = { path = "../rag", version = "0.0.7" }
# The shared tenancy composition layer (`ResourceKey`). A pure-data contract
# crate (serde/schemars/semver only) — NOT apps/core — so depending on it to
# derive `DocOwner` keeps the "ZERO apps/core dependency" invariant intact.
ryu-kernel-contracts = { path = "../kernel-contracts", version = "0.0.7" }

[dev-dependencies]
tokio = { version = "1", features = ["macros", "rt"] }
