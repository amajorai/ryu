[package]
name = "ryu-usage"
version = "0.0.5"
edition = "2021"
license = "Apache-2.0"
description = "Per-agent subscription usage-metering primitive for Ryu: reads the OAuth token a subscription CLI (Claude Code / Codex) already stored on this machine and calls the vendor's own usage endpoint to return normalized rolling rate-limit windows (5h session + weekly), à la CodexBar / openusage. NEVER refreshes the token (single-use refresh tokens rotate; refreshing would log the real CLI out). An extracted Core capability crate; in-process by default and consumed as a NON-optional path dependency (the `GET /api/agents/:id/usage` route is mounted unconditionally). Its one kernel coupling — the Ryu-isolated `CODEX_HOME` (profile/relocation-aware `~/.ryu` data dir) — inverts through the narrow `UsageHost` trait so this crate has ZERO dependency on apps/core. Feeds the gateway budget cross-tier picture later."
repository = "https://github.com/amajorai/ryu"

# Versions are matched to apps/core/Cargo.toml so there is no version skew when
# Core links this crate in-process. This crate has ZERO dependency on apps/core.
[dependencies]
serde = { version = "1", features = ["derive"] }
serde_json = "1"
# Keep reqwest's default features (rustls/native TLS) — the usage calls are HTTPS
# to api.anthropic.com / chatgpt.com; dropping defaults would break the TLS backend.
reqwest = { version = "0.12", features = ["json"] }
base64 = { version = "0.22", features = ["alloc"] }
chrono = { version = "0.4", features = ["serde"] }
dirs = "5"
# rt + macros only: `spawn_blocking` needs the runtime, `#[tokio::test]` the macro.
tokio = { version = "1", features = ["rt", "macros"] }
