[package]
name = "ryu-vad"
version = "0.0.5"
edition = "2021"
license = "Apache-2.0"
description = "Voice activity detection (VAD) modality primitive for Ryu: `detect(frame) -> speech_prob` feeding an endpointing/barge-in state machine. An extracted Core capability crate — in-process FOREVER (per-frame hot path, NEVER IPC) and consumed as a NON-optional path dependency (the voice session drives it per uplink hop). The endpointing/barge-in gate + an energy speech-probability backend are always compiled; the noise-robust Silero VAD ONNX inference is the genuinely in-process hot path behind the `voice-vad` feature, falling back per-hop to energy so voice mode never breaks. The one host coupling the crate cannot own (the `~/.ryu` data dir the Silero model resolves against, which is user-relocatable at runtime) is injected via the narrow `VadHost` trait installed at boot, so the crate has ZERO dependency on apps/core."
repository = "https://github.com/amajorai/ryu"

# Versions are matched to apps/core/Cargo.toml so there is no version skew when
# Core links this crate in-process. This crate has ZERO dependency on apps/core.
[dependencies]
tracing = "0.1"

# The Silero VAD download spec + model-path resolution live with the crate (VAD has
# no sidecar — it's single-file model metadata). The DownloadSpec/DownloadKind/
# VersionRecord types come from the already-extracted downloads primitive.
ryu-downloads = { path = "../downloads", version = "0.0.5" }

# ── Silero VAD optional dep (in-process ONNX inference) ────────────────────────
# transcribe-rs is git-only and pulls a heavy native ONNX Runtime; it lives behind
# the `voice-vad` feature so the default build stays free of the native dep (the
# always-compiled energy backend keeps voice mode working). Matched to the same git
# rev Core used before extraction (shared with ryu-stt's parakeet engine).
transcribe-rs = { version = "0.3.11", default-features = false, features = ["onnx"], optional = true }
# Only the feature-gated Silero ONNX backend uses anyhow; keep it out of the lean
# default build alongside transcribe-rs.
anyhow = { version = "1", optional = true }

[features]
# Off by default (keep `cargo test`/CI lean, same posture as Core's pre-extraction
# feature). When off, the VAD uses the always-compiled energy speech-probability
# backend. When on, it prefers Silero's noise-robust ONNX model, falling back
# per-hop to energy on any inference error or missing model.
voice-vad = ["dep:transcribe-rs", "transcribe-rs/vad-silero", "dep:anyhow"]
