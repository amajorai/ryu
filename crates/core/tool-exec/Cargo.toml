[package]
name = "ryu-tool-exec"
version = "0.0.5"
edition = "2021"
license = "Apache-2.0"
description = "The programmatic-tool-calling (PTC) code-execution sandbox primitive for Ryu: Deno-subprocess backend with deny-by-default permissions, real process isolation, tool-call bridging back to the host, and exec budgets. Part of the Ryu monorepo (github.com/amajorai/ryu)."
repository = "https://github.com/amajorai/ryu"

# `tool-exec-deno` is the default backend (Deno on PATH — no crate dep). The
# secure-exec backend is off-by-default (Linux + bun). With NO feature the crate
# still compiles: the types + `CodeExecutor::Unavailable` are always present, so
# a lean Core build (and gate #3) links a sandbox-less but valid tool-exec.
[features]
default = ["tool-exec-deno"]
tool-exec-deno = []
tool-exec-securexec = []

# Versions are matched to apps/core/Cargo.toml so there is no version skew when
# Core links this crate in-process. This crate has ZERO dependency on apps/core.
[dependencies]
async-trait = "0.1"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
# The unified permission grammar (PermissionSet) this backend lowers to Deno
# `--allow-*` flags. A leaf contract crate (serde/schemars/semver only) so there
# is no dependency cycle, and it carries ZERO dependency on apps/core.
ryu-kernel-contracts = { path = "../kernel-contracts", version = "0.0.5" }
tokio = { version = "1", features = ["io-util", "process", "time", "rt", "macros", "sync"] }
uuid = { version = "1", features = ["v4"] }

[dev-dependencies]
tokio = { version = "1", features = ["macros", "rt", "rt-multi-thread"] }
